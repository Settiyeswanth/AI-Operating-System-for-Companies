[project]
name = "aios-core"
version = "0.1.0"
description = "Shared schemas, config, and LLM gateway for AI OS"
requires-python = ">=3.11"

dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "httpx>=0.27",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
